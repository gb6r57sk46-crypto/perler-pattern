<script>
// ====== 拼豆色板定义 ======
const BEAD_PALETTE = [
    { code: 'W01', name: '白色',   rgb: [255, 255, 255] },
    { code: 'W02', name: '象牙白', rgb: [255, 253, 230] },
    { code: 'Y01', name: '浅黄',   rgb: [255, 255, 150] },
    { code: 'Y02', name: '黄色',   rgb: [255, 221, 0]   },
    { code: 'Y03', name: '橙黄',   rgb: [255, 179, 0]   },
    { code: 'O01', name: '浅橙',   rgb: [255, 183, 130] },
    { code: 'O02', name: '橙色',   rgb: [255, 122, 0]   },
    { code: 'P01', name: '蜜桃',   rgb: [255, 183, 165] },
    { code: 'P02', name: '浅粉',   rgb: [255, 183, 197] },
    { code: 'P03', name: '粉色',   rgb: [255, 105, 150] },
    { code: 'P04', name: '玫红',   rgb: [255, 50, 100]  },
    { code: 'R01', name: '红色',   rgb: [210, 0, 0]     },
    { code: 'R02', name: '深红',   rgb: [130, 0, 0]     },
    { code: 'R03', name: '铁锈红', rgb: [165, 60, 20]   },
    { code: 'L01', name: '浅紫',   rgb: [200, 170, 220] },
    { code: 'L02', name: '薰衣草', rgb: [150, 110, 180] },
    { code: 'V01', name: '紫色',   rgb: [100, 0, 150]   },
    { code: 'V02', name: '深紫',   rgb: [60, 0, 90]     },
    { code: 'M01', name: '品红',   rgb: [200, 0, 100]   },
    { code: 'B01', name: '浅蓝',   rgb: [140, 190, 255] },
    { code: 'B02', name: '天蓝',   rgb: [80, 150, 230]  },
    { code: 'B03', name: '蓝色',   rgb: [0, 70, 180]    },
    { code: 'B04', name: '宝蓝',   rgb: [0, 30, 130]    },
    { code: 'B05', name: '深蓝',   rgb: [0, 0, 80]      },
    { code: 'G01', name: '浅绿',   rgb: [150, 230, 150] },
    { code: 'G02', name: '嫩绿',   rgb: [80, 200, 80]   },
    { code: 'G03', name: '黄绿',   rgb: [130, 200, 0]   },
    { code: 'G04', name: '绿色',   rgb: [0, 140, 0]     },
    { code: 'G05', name: '森绿',   rgb: [0, 90, 30]     },
    { code: 'G06', name: '深绿',   rgb: [0, 60, 20]     },
    { code: 'T01', name: '薄荷',   rgb: [160, 230, 200] },
    { code: 'T02', name: '青色',   rgb: [0, 160, 140]   },
    { code: 'GR1', name: '浅灰',   rgb: [192, 192, 192] },
    { code: 'GR2', name: '灰色',   rgb: [128, 128, 128] },
    { code: 'GR3', name: '深灰',   rgb: [64, 64, 64]    },
    { code: 'BK1', name: '黑色',   rgb: [0, 0, 0]       },
    { code: 'N01', name: '米色',   rgb: [210, 180, 140] },
    { code: 'N02', name: '浅棕',   rgb: [180, 120, 60]  },
    { code: 'N03', name: '棕色',   rgb: [130, 70, 20]   },
    { code: 'N04', name: '深棕',   rgb: [70, 35, 10]    },
];

// ====== 状态变量 ======
let uploadedImage = null;
let boardSize = 29;
let useDither = true;
let cropMode = 'smart'; // 'smart' | 'fill'
let fillColor = 'white'; // 'white' | 'black' | 'auto'
let showLabels = false;
let patternData = null; // 2D array of palette indices

// ====== 上传处理 ======
const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');
const previewImg = document.getElementById('preview-img');
const uploadPrompt = document.getElementById('upload-prompt');
const genBtn = document.getElementById('gen-btn');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
    if (!file.type.startsWith('image/')) return alert('请上传图片文件');
    const reader = new FileReader();
    reader.onload = e => {
        const img = new Image();
        img.onload = () => {
            uploadedImage = img;
            previewImg.src = e.target.result;
            previewImg.style.display = 'block';
            uploadPrompt.style.display = 'none';
            uploadArea.classList.add('has-image');
            genBtn.disabled = false;
            showImageInfo(img);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// ====== 图片信息展示 ======
function showImageInfo(img) {
    const w = img.naturalWidth, h = img.naturalHeight;
    const ratio = (w / h).toFixed(2);
    const ratioDesc = w === h ? '1:1 正方形 ✅' :
                      Math.abs(w/h - 1) < 0.15 ? `约1:1 接近正方形 ✅` :
                      w > h ? `${ratio}:1 横版图片` : `1:${(h/w).toFixed(2)} 竖版图片`;

    // Complexity estimate: downscale and count unique colors
    const tc = document.createElement('canvas');
    tc.width = 50; tc.height = 50;
    const tctx = tc.getContext('2d');
    tctx.drawImage(img, 0, 0, 50, 50);
    const td = tctx.getImageData(0, 0, 50, 50).data;
    const colorSet = new Set();
    for (let i = 0; i < td.length; i += 16) { // sample every 4th pixel
        colorSet.add(`${td[i]>>4},${td[i+1]>>4},${td[i+2]>>4}`);
    }
    const complexity = colorSet.size;
    const complexDesc = complexity < 80 ? '🟢 简单' : complexity < 200 ? '🟡 中等' : '🔴 复杂';
    const sizeRec = complexity < 100 ? '推荐小方板 29×29 即可' : '推荐大方板 58×58 效果更好';

    const infoHtml = `
        <div>📐 尺寸：${w} × ${h}px · ${ratioDesc}</div>
        <div>🎨 复杂度：${complexDesc}（${complexity}色）· ${sizeRec}</div>
        ${w < 100 || h < 100 ? '<div style="color:#e67e22">⚠️ 图片较小，放大后可能模糊，建议上传更大尺寸的图</div>' : ''}
        ${w !== h ? '<div style="color:#c44dff">💡 非正方形图片，建议选择"智能裁剪"避免变形</div>' : ''}
    `;
    document.getElementById('image-info-content').innerHTML = infoHtml;
    document.getElementById('image-info-card').style.display = 'block';
    document.getElementById('crop-card').style.display = w === h ? 'none' : 'block';
    document.getElementById('size-recommend').textContent = `· ${sizeRec}`;

    // Auto-select board size based on complexity
    if (complexity >= 100) {
        document.querySelectorAll('.size-btn[data-size]').forEach(b => {
            b.classList.toggle('active', b.dataset.size === '58');
        });
        boardSize = 58;
    }
}

// ====== 设置交互 ======
function selectSize(el) {
    document.querySelectorAll('.size-btn[data-size]').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    boardSize = parseInt(el.dataset.size);
}

function toggleDither() {
    const t = document.getElementById('dither-toggle');
    useDither = !useDither;
    t.classList.toggle('active', useDither);
}

function selectCrop(el) {
    document.querySelectorAll('.size-btn[data-crop]').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    cropMode = el.dataset.crop;
    document.getElementById('fill-color-row').style.display = cropMode === 'fill' ? 'flex' : 'none';
}

function selectBg(el) {
    document.querySelectorAll('.bg-opt').forEach(b => b.style.borderColor = '#ccc');
    el.style.borderColor = '#c44dff';
    fillColor = el.dataset.bg;
}

function toggleLabel() {
    const t = document.getElementById('label-toggle');
    showLabels = !showLabels;
    t.classList.toggle('active', showLabels);
    if (patternData) renderPattern();
}

// ====== 颜色匹配 ======
function colorDistance(r1, g1, b1, r2, g2, b2) {
    // Weighted Euclidean distance for better perceptual matching
    const rmean = (r1 + r2) / 2;
    const dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
    return Math.sqrt(
        (2 + rmean / 256) * dr * dr +
        4 * dg * dg +
        (2 + (255 - rmean) / 256) * db * db
    );
}

function findNearestColorIndex(r, g, b) {
    let minDist = Infinity, minIdx = 0;
    for (let i = 0; i < BEAD_PALETTE.length; i++) {
        const [pr, pg, pb] = BEAD_PALETTE[i].rgb;
        const d = colorDistance(r, g, b, pr, pg, pb);
        if (d < minDist) { minDist = d; minIdx = i; }
    }
    return minIdx;
}

// ====== 核心：生成图纸 ======
async function generate() {
    if (!uploadedImage) return;
    const loading = document.getElementById('loading');
    loading.classList.add('show');

    // Use setTimeout to let UI update
    await new Promise(r => setTimeout(r, 50));

    try {
        const size = boardSize;

        // Resize image to board dimensions with crop/fill handling
        const srcCanvas = document.createElement('canvas');
        srcCanvas.width = size;
        srcCanvas.height = size;
        const srcCtx = srcCanvas.getContext('2d');
        srcCtx.imageSmoothingEnabled = true;
        srcCtx.imageSmoothingQuality = 'high';

        const iw = uploadedImage.naturalWidth;
        const ih = uploadedImage.naturalHeight;

        if (cropMode === 'fill') {
            // Fill mode: fit entire image, fill background
            let bgR = 255, bgG = 255, bgB = 255; // default white
            if (fillColor === 'black') { bgR = 0; bgG = 0; bgB = 0; }
            else if (fillColor === 'auto') {
                // Sample edges to determine background color
                const tc = document.createElement('canvas');
                tc.width = 20; tc.height = 20;
                const tctx = tc.getContext('2d');
                tctx.drawImage(uploadedImage, 0, 0, 20, 20);
                const edgeData = tctx.getImageData(0, 0, 20, 20).data;
                let sr = 0, sg = 0, sb = 0, cnt = 0;
                // Sample border pixels
                for (let y = 0; y < 20; y++) for (let x = 0; x < 20; x++) {
                    if (x === 0 || x === 19 || y === 0 || y === 19) {
                        const i = (y * 20 + x) * 4;
                        sr += edgeData[i]; sg += edgeData[i+1]; sb += edgeData[i+2]; cnt++;
                    }
                }
                bgR = Math.round(sr/cnt); bgG = Math.round(sg/cnt); bgB = Math.round(sb/cnt);
            }
            srcCtx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
            srcCtx.fillRect(0, 0, size, size);

            // Scale to fit, centered
            const scale = Math.min(size / iw, size / ih);
            const dw = iw * scale, dh = ih * scale;
            const dx = (size - dw) / 2, dy = (size - dh) / 2;
            srcCtx.drawImage(uploadedImage, dx, dy, dw, dh);
        } else {
            // Smart crop: cover the square, crop edges, center on image
            const scale = Math.max(size / iw, size / ih);
            const sw = size / scale, sh = size / scale;
            const sx = (iw - sw) / 2, sy = (ih - sh) / 2;
            srcCtx.drawImage(uploadedImage, sx, sy, sw, sh, 0, 0, size, size);
        }

        const imgData = srcCtx.getImageData(0, 0, size, size);
        const pixels = imgData.data;

        // Color quantization
        patternData = new Array(size);
        for (let y = 0; y < size; y++) {
            patternData[y] = new Array(size);
        }

        if (useDither) {
            // Floyd-Steinberg dithering
            const fs = new Float32Array(size * size * 3);
            for (let i = 0; i < size * size; i++) {
                fs[i * 3] = pixels[i * 4];
                fs[i * 3 + 1] = pixels[i * 4 + 1];
                fs[i * 3 + 2] = pixels[i * 4 + 2];
            }

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const idx = (y * size + x) * 3;
                    const r = Math.max(0, Math.min(255, Math.round(fs[idx])));
                    const g = Math.max(0, Math.min(255, Math.round(fs[idx + 1])));
                    const b = Math.max(0, Math.min(255, Math.round(fs[idx + 2])));

                    const ci = findNearestColorIndex(r, g, b);
                    patternData[y][x] = ci;

                    const [nr, ng, nb] = BEAD_PALETTE[ci].rgb;
                    const errR = r - nr, errG = g - ng, errB = b - nb;

                    const distribute = (dx, dy, factor) => {
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < size && ny < size) {
                            const ni = (ny * size + nx) * 3;
                            fs[ni] += errR * factor;
                            fs[ni + 1] += errG * factor;
                            fs[ni + 2] += errB * factor;
                        }
                    };
                    distribute(1, 0, 7/16);
                    distribute(-1, 1, 3/16);
                    distribute(0, 1, 5/16);
                    distribute(1, 1, 1/16);
                }
            }
        } else {
            // Simple nearest color
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const i = (y * size + x) * 4;
                    patternData[y][x] = findNearestColorIndex(pixels[i], pixels[i+1], pixels[i+2]);
                }
            }
        }

        // Render and show results
        renderPattern();
        showStats();
        document.getElementById('result-section').classList.add('show');
        document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } finally {
        loading.classList.remove('show');
    }
}

// ====== 渲染图纸 ======
function renderPattern() {
    const size = boardSize;
    // Larger cells when labels are shown
    let cellSize;
    if (showLabels) {
        cellSize = size <= 29 ? 28 : 18;
    } else {
        cellSize = size <= 29 ? 20 : 14;
    }
    const canvasSize = size * cellSize + 1;

    const canvas = document.getElementById('pattern-canvas');
    canvas.width = canvasSize;
    canvas.height = canvasSize;
    const ctx = canvas.getContext('2d');

    // Fill cells with bead colors
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            const ci = patternData[y][x];
            const [r, g, b] = BEAD_PALETTE[ci].rgb;
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);

            if (showLabels && cellSize >= 16) {
                // Draw color code text
                const code = BEAD_PALETTE[ci].code;
                // Determine text color: light bg → dark text, dark bg → light text
                const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                ctx.fillStyle = brightness > 128 ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.85)';
                const fontSize = cellSize >= 28 ? 9 : 7;
                ctx.font = `bold ${fontSize}px monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(code, x * cellSize + cellSize / 2, y * cellSize + cellSize / 2);
            } else if (cellSize >= 14) {
                // Draw bead hole in center
                const cx = x * cellSize + cellSize / 2;
                const cy = y * cellSize + cellSize / 2;
                const holeR = Math.max(2, cellSize * 0.15);
                ctx.beginPath();
                ctx.arc(cx, cy, holeR, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,0,0,0.12)`;
                ctx.fill();
            }
        }
    }

    // Grid lines
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= size; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cellSize + 0.5, 0);
        ctx.lineTo(i * cellSize + 0.5, canvasSize);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * cellSize + 0.5);
        ctx.lineTo(canvasSize, i * cellSize + 0.5);
        ctx.stroke();
    }

    // Thicker lines every 5 cells for counting
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= size; i += 5) {
        ctx.beginPath();
        ctx.moveTo(i * cellSize + 0.5, 0);
        ctx.lineTo(i * cellSize + 0.5, canvasSize);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * cellSize + 0.5);
        ctx.lineTo(canvasSize, i * cellSize + 0.5);
        ctx.stroke();
    }

    // Row/column numbers for counting
    if (cellSize >= 14) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        const numFontSize = Math.max(8, cellSize * 0.5);
        ctx.font = `${numFontSize}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        // Column numbers at top
        for (let x = 0; x < size; x += 5) {
            ctx.fillText(x + 1, x * cellSize + cellSize / 2, 2);
        }
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        // Row numbers at left
        for (let y = 0; y < size; y += 5) {
            ctx.fillText(y + 1, 2, y * cellSize + cellSize / 2);
        }
    }
}

// ====== 统计 ======
function showStats() {
    const counts = {};
    const size = boardSize;
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            const ci = patternData[y][x];
            counts[ci] = (counts[ci] || 0) + 1;
        }
    }

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const totalBeads = size * size;

    document.getElementById('stat-total').textContent = totalBeads;
    document.getElementById('stat-colors').textContent = sorted.length;

    const colorList = document.getElementById('color-list');
    colorList.innerHTML = sorted.map(([ci, cnt]) => {
        const c = BEAD_PALETTE[ci];
        const pct = ((cnt / totalBeads) * 100).toFixed(1);
        return `<div class="color-item">
            <div class="color-swatch" style="background:rgb(${c.rgb.join(',')})"></div>
            <span class="color-name">${c.code} ${c.name}</span>
            <span class="color-count">${cnt}颗 (${pct}%)</span>
        </div>`;
    }).join('');
}

// ====== 下载 ======
function downloadPattern() {
    const canvas = document.getElementById('pattern-canvas');
    canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `拼豆图纸_${boardSize}x${boardSize}.png`;
        a.click();
        URL.revokeObjectURL(url);
    }, 'image/png');
}
